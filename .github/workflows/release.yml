name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Påkrevd for Trusted Publishing (OIDC)
      pull-requests: write # Påkrevd for at Changesets skal lage PR-er
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10 # Eller din foretrukne pnpm-versjon
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'
          registry-url: 'https://npmjs.org'

      - run: pnpm install
      - run: pnpm turbo run build # Bruker turbo til å bygge alt i rett rekkefølge

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ved Trusted Publishing trenger du IKKE NPM_TOKEN her!
